resource:
    name: BundledProducts
    shortName: bundled-products
    description: 'Storefront bundled concrete products'

    provider: Spryker\Glue\ProductBundlesRestApi\Api\Storefront\Provider\BundledProductsStorefrontProvider

    paginationEnabled: false

    operations:
        - type: GetCollection
          uriTemplate: /concrete-products/{concreteProductSku}/bundled-products
          description: 'Retrieve bundled products for a concrete product'
          uriVariables:
              concreteProductSku:
                  fromClass: ConcreteProductsStorefrontResource

        - type: GetCollection
          name: getBundledProductsFallbackMissingSku
          uriTemplate: '/concrete-products/bundled-products'
          description: 'Backward compatibility — returns 400 when concrete product SKU is missing'

    includableIn:
        - resource: ConcreteProducts
          relationshipName: bundled-products
          uriVariableMappings:
              sku: concreteProductSku

    includes:
        - relationshipName: concrete-products
          targetResource: ConcreteProducts
          uriTemplate: /concrete-products/{sku}
          uriVariableMappings:
              sku: sku
          autoInclude: true

    properties:
        sku:
            type: string
            identifier: true
            writable: false
            readable: true
            description: 'SKU of the bundled concrete product'
            openapiContext:
                example: '001_25904006'

        quantity:
            type: integer
            writable: false
            readable: true
            required: false
            description: 'Quantity of this bundled item inside the bundle'
            openapiContext:
                example: 2
